<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Test</title>
  <style>
    body {
      background-color: #111827;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    #root {
      max-width: 600px;
      text-align: center;
    }
    
    h1 {
      color: #9ed04b;
    }
    
    button {
      background-color: #9ed04b;
      color: #111827;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load React directly from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Test React code -->
  <script type="text/babel">
    const TestApp = () => {
      return (
        <div>
          <h1>React Test Page</h1>
          <p>If you can see this, direct React rendering is working!</p>
          <p>This is a separate test outside of the Vite environment.</p>
          <button onClick={() => alert('React event handling is working!')}>
            Click Me
          </button>
        </div>
      );
    };

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TestApp />);
  </script>
</body>
</html>
